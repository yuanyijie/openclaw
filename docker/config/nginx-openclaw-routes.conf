# OpenClaw routes — proxied through the AIO nginx entrypoint (port 5000)

# Health / readiness probes
location /openclaw/healthz {
    rewrite ^/openclaw/healthz$ /healthz break;
    proxy_pass http://openclaw;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /openclaw/readyz {
    rewrite ^/openclaw/readyz$ /readyz break;
    proxy_pass http://openclaw;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Catch-all for openclaw API and webhook endpoints
location /openclaw/ {
    rewrite ^/openclaw/(.*)$ /$1 break;
    proxy_pass http://openclaw;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # WebSocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
}
