version: "0.5"

log_level: info

environment:
  - PATH=/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin

processes:
  nas-init:
    command: "/usr/local/bin/nas-init.sh"
    availability:
      restart: "no"
    log_configuration:
      disable_json: true
      no_metadata: false
      add_timestamp: true
      timestamp_format: "2006-01-02 15:04:05.000"
      fields_to_append:
        - level=INFO

  nas-sync:
    command: "su user -c '/usr/local/bin/nas-sync.sh'"
    depends_on:
      nas-init:
        condition: process_completed_successfully
    availability:
      restart: "always"
      backoff_seconds: 5
      max_restarts: 10
    log_configuration:
      disable_json: true
      no_metadata: false
      add_timestamp: true
      timestamp_format: "2006-01-02 15:04:05.000"
      fields_to_append:
        - level=INFO

  openclaw:
    command: "su user -c '/usr/bin/node /app/openclaw/openclaw.mjs gateway --port 18789 --allow-unconfigured'"
    depends_on:
      nas-init:
        condition: process_completed_successfully
    availability:
      restart: "always"
      backoff_seconds: 3
      max_restarts: 5
    readiness_probe:
      http_get:
        host: localhost
        port: ${OPENCLAW_GATEWAY_PORT:-18789}
        path: /healthz
      initial_delay_seconds: 2
      period_seconds: 10
      timeout_seconds: 3
      success_threshold: 1
      failure_threshold: 3
    environment:
      - OPENCLAW_GATEWAY_PORT=18789
      - NODE_ENV=production
      - HOME=/home/user
      - OPENCLAW_SKIP_CHANNELS=${OPENCLAW_SKIP_CHANNELS:-0}
      - OPENCLAW_SKIP_BROWSER_CONTROL_SERVER=1
      - OPENCLAW_DISABLE_BONJOUR=1
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
    log_configuration:
      disable_json: true
      no_metadata: false
      add_timestamp: true
      timestamp_format: "2006-01-02 15:04:05.000"
      fields_to_append:
        - level=INFO
